<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect - Add Event</title>
    <!-- Linked CSS for Week 2 -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="events.html">Events</a>
            <a href="add-event.html">Add Event</a>
            <a href="my-registrations.html">My Registrations</a>
        </nav>
    </header>

    <main>
        <h1>Create a New Event</h1>
        
        <form id="add-event-form">
            <div>
                <label for="event-name">Event Name</label>
                <input type="text" id="event-name" name="eventName" placeholder="e.g. Annual Tech Fest" required>
            </div>

            <div>
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    <option value="" disabled selected>Select a category</option>
                    <option value="fest">Fest</option>
                    <option value="workshop">Workshop</option>
                    <option value="sports">Sports</option>
                    <option value="club">Club</option>
                </select>
            </div>

            <div>
                <label for="event-date">Date</label>
                <input type="date" id="event-date" name="eventDate" required>
            </div>

            <div>
                <label for="event-time">Time</label>
                <input type="time" id="event-time" name="eventTime" required>
            </div>

            <div>
                <label for="venue">Venue</label>
                <input type="text" id="venue" name="venue" required>
            </div>

            <div>
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="5" required></textarea>
            </div>

            <div>
                <label for="org-name">Organiser Name</label>
                <input type="text" id="org-name" name="orgName" required>
            </div>

            <div>
                <label for="org-email">Organiser Email</label>
                <input type="email" id="org-email" name="orgEmail" required>
            </div>

            <button type="submit">Submit Event</button>
        </form>
    </main>
</body>
</html>
